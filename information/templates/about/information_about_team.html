{% extends 'team_list/base.html' %}

{% block title %}PC Cleaner Pro - Информация о продукте{% endblock %}

{% block content %}
<div class="product-info-container">
    <div class="product-header">
        <h1 id="typing-title">Информация о продукте</h1>
        <div class="product-decoration">
            <div class="decoration-line"></div>
            <div class="decoration-dot"></div>
            <div class="decoration-line"></div>
        </div>
    </div>
    
    <div class="product-card">
        <div class="product-section">
            <h2 class="product-title">Название: <span class="product-value typing-text" data-text="Phantom"></span></h2>
        </div>
        
        <div class="product-section">
            <h2 class="product-title">Описание:</h2>
            <p class="product-description typing-text" data-text="Наша программа предназначена для обхода популярных и непопулярных серверов в СНГ-регионе, включая <strong>FUNTIME, REALLYWORLD, HOLYWORLD</strong>, а также их копии и отдельные сервера."></p>
        </div>
        
        <div class="product-section">
            <h2 class="product-title">Ключевые преимущества:</h2>
            <ul class="advantages-list">
                <li>
                    <i class="fas fa-check-circle advantage-icon"></i>
                    <span class="typing-text" data-text="<span class='advantage-title'>Стабильность и обновления</span> – В отличие от временных решений (кряков и т. д.), наша программа постоянно обновляется и поддерживается."></span>
                </li>
                <li>
                    <i class="fas fa-check-circle advantage-icon"></i>
                    <span class="typing-text" data-text="<span class='advantage-title'>Экономия денег</span> – Доступная ценовая политика, выгодно отличающаяся от обычных читов."></span>
                </li>
                <li>
                    <i class="fas fa-check-circle advantage-icon"></i>
                    <span class="typing-text" data-text="<span class='advantage-title'>Развитие и улучшение</span> – Мы ежедневно работаем над новым функционалом и исправляем ошибки на этапе <strong>ЗБТ (Закрытый Бета-Тест)</strong>."></span>
                </li>
            </ul>
        </div>
        
        <div class="product-announcement">
            <div class="announcement-icon">
                <i class="fas fa-bullhorn"></i>
            </div>
            <div class="announcement-content">
                <h3 class="typing-text" data-text="Вас ждет много нового!"></h3>
                <p class="typing-text" data-text="Разработка активно продолжается и мы надеемся, что скоро уже покажем на практике полный обзор и работоспособность нашей программы для скрытия читов на вашем компьютере. Мы готовим для вас максимально качественный продукт, который будет предоставлять все удобства, все будет на высшем уровне!"></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
