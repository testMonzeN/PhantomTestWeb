{% load static %}

<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | PC Cleaner Pro</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <h2><i class="fas fa-sign-in-alt"></i> Вход в аккаунт</h2>

      <form method="POST" class="auth-form">
        {% csrf_token %}

        <div class="form-group">
          <label for="id_username"><i class="fas fa-user"></i> Логин</label>
          {{ form.username }}
        </div>

        <div class="form-group">
          <label for="id_password"><i class="fas fa-lock"></i> Пароль</label>
          {{ form.password }}
          <a href="#" class="forgot-password">Забыли пароль?</a>
        </div>

        <button type="submit" class="auth-submit-btn">Войти</button>

        <div class="auth-footer">
          Нет аккаунта? <a href="{% url 'register' %}">Зарегистрируйтесь</a>
        </div>
      </form>
    </div>
  </div>

  <script src="{% static 'js/script.js' %}"></script>
</body>
</html>
